<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200" role="img" aria-label="agent-memory — git-native memory for AI coding agents">
  <title>agent-memory — git-native memory for AI coding agents</title>
  <rect width="640" height="200" rx="18" fill="#0d1117"/>

  <!-- mark: the .agent-memory store holding @id-anchored sections -->
  <rect x="44" y="56" width="88" height="88" rx="18" fill="none" stroke="#8b5cf6" stroke-width="5"/>
  <rect x="62" y="78"    width="46" height="9" rx="4.5" fill="#8b5cf6"/>
  <rect x="62" y="95.5"  width="34" height="9" rx="4.5" fill="#8b5cf6" opacity="0.75"/>
  <rect x="62" y="113"   width="40" height="9" rx="4.5" fill="#8b5cf6" opacity="0.55"/>
  <circle cx="116" cy="82.5" r="5" fill="#a78bfa"/>

  <!-- wordmark: monospace = developer tool; two-tone via tspans (font-independent flow) -->
  <text x="168" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="44" font-weight="700">
    <tspan fill="#e6edf3">agent-</tspan><tspan fill="#a78bfa">memory</tspan>
  </text>

  <!-- tagline -->
  <text x="170" y="132" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="19" fill="#8b949e">git-native memory for AI coding agents</text>
</svg>
