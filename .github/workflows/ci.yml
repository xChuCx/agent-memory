name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
      - name: go test -race (linux only)
        if: matrix.os == 'ubuntu-latest'
        run: go test -race ./...

  e2e:
    # End-to-end smoke: compiles the binary and drives every Release 0.1
    # subcommand + the MCP server through real subprocess calls. Linux only —
    # the test exercises platform-portable logic, and subprocess startup +
    # SQLite warmup is heavier than the unit suite. The build matrix above
    # already covers per-OS compatibility of the inner packages.
    name: e2e (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: go test -tags=e2e
        run: go test -tags=e2e -v -timeout 120s ./internal/e2e/...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      # The default `version: latest` resolves to a pre-built binary
      # compiled with Go 1.24, which refuses to load a go.mod targeting
      # Go 1.25 (one of our transitive deps requires the higher version).
      # `install-mode: goinstall` builds golangci-lint from source with
      # the project's Go toolchain instead, so the linter's runtime Go
      # version always matches the module's go directive.
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
